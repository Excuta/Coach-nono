version: 2
updates:
  # Docker pipeline dependencies (services/pipeline/pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/services/pipeline"
    schedule:
      interval: "weekly"

  # Windows capture agent dependencies (capture/requirements.txt)
  - package-ecosystem: "pip"
    directory: "/capture"
    schedule:
      interval: "weekly"

  # Docker base images (services/pipeline/Dockerfile)
  - package-ecosystem: "docker"
    directory: "/services/pipeline"
    schedule:
      interval: "weekly"
